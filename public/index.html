<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Galaxy Filmes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="cabecalho">
      <img
        src="https://i.postimg.cc/BvXs8g8X/capa.png
        "
      />
    </header>

    <section class="chamada">
      <h1>O melhor catálogo de filmes de terror</h1>
    </section>

    <main class="filmes">
      <article>
        <h2>Olhos Famintos (2001)</h2>
        <a href="orcamento.html" class="botao">Alugue seu filme</a>
        <img
          src="https://i.postimg.cc/YSZ7QWgm/creep.png
          "
        />
      </article>

      <article>
        <h2>Sexta-feira 13 (1980)</h2>
        <a href="orcamento.html" class="botao">Alugue seu filme</a>
        <img
          src="https://i.postimg.cc/s2qz5hSG/sexta.png
          "
        />
      </article>

      <article>
        <h2>O Massacre da Serra Elétrica (1974)</h2>
        <a href="orcamento.html" class="botao">Alugue seu filme</a>
        <img
          src="https://i.postimg.cc/bNttnxtQ/serra.png
          "
        />
      </article>
    </main>

    <section class="alunos-cadastrados">
      <h3>Alunos Cadastrados</h3>
      <table id="tabela-alunos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <footer class="rodape">
      <p>© 2026 Matiello. Todos os direitos reservados.</p>
    </footer>

    <script>
      function carregarAlunos() {
        fetch('/api/alunos')
          .then((resposta) => resposta.json())
          .then((alunos) => {
            const tbody = document.querySelector('#tabela-alunos tbody');
            tbody.innerHTML = '';

            alunos.forEach((aluno) => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td>${aluno.id}</td>
                <td>${aluno.nome}</td>
                <td>${aluno.email}</td>
                <td><button class="botao-excluir" onclick="excluirAluno(${aluno.id})">Deletar</button></td>
              `;
              tbody.appendChild(tr);
            });
          });
      }

      function excluirAluno(id) {
        if (confirm('Tem certeza que deseja apagar o registro deste aluno?')) {
          fetch('/api/alunos/' + id, { method: 'DELETE' }).then((resposta) => {
            if (resposta.ok) {
              carregarAlunos();
            } else {
              alert('Erro ao excluir.');
            }
          });
        }
      }

      window.onload = carregarAlunos;
    </script>
  </body>
</html>
