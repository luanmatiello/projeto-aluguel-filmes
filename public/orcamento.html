<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>Cadastro de Aluno</h1>

    <form method="POST" action="/cadastrar">

      <button type="submit">Cadastrar</button>
    </form>

    <a href="/">Voltar</a>
  </body>
</html>
